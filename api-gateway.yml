spring:
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: true
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: AUTH-SERVICE
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**
          filters:
            - StripPrefix=1
        - id: MENTOR-SERVICE
          uri: lb://mentor-service
          predicates:
            - Path=/mentor-service/**
          filters:
            - StripPrefix=1
        - id: USER-SERVICE
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1
        - id: SESSION-SERVICE
          uri: lb://session-service
          predicates:
            - Path=/session-service/**
          filters:
            - StripPrefix=1
        - id: REVIEW-SERVICE
          uri: lb://review-service
          predicates:
            - Path=/review-service/**
          filters:
            - StripPrefix=1
        - id: SKILL-SERVICE
          uri: lb://skill-service
          predicates:
            - Path=/skill-service/**
          filters:
            - StripPrefix=1
        - id: NOTIFICATION-SERVICE
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/**
          filters:
            - StripPrefix=1

server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin-server:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    urls:
      - name: Auth Service API
        url: /auth-service/v3/api-docs
      - name: Mentor Service API
        url: /mentor-service/v3/api-docs
      - name: User Service API
        url: /user-service/v3/api-docs
      - name: Session Service API
        url: /session-service/v3/api-docs
      - name: Review Service API
        url: /review-service/v3/api-docs
      - name: Skill Service API
        url: /skill-service/v3/api-docs
