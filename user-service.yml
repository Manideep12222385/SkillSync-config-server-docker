server:
  forward-headers-strategy: framework
  port: 8084

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://mysql-db:3306/user_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
    hostname: 127.0.0.1
    
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://zipkin-server:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: "*"
